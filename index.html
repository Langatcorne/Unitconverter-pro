<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter Pro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="converter-wrapper">
            <div class="header">
                <h1>⚙️ Unit Converter Pro</h1>
                <p class="subtitle">Convert between multiple units instantly</p>
            </div>

            <!-- Category Selection -->
            <div class="category-section">
                <h2>Select Category</h2>
                <div class="category-buttons">
                    <button class="category-btn active" data-category="length">Length</button>
                    <button class="category-btn" data-category="weight">Weight</button>
                    <button class="category-btn" data-category="temperature">Temperature</button>
                    <button class="category-btn" data-category="volume">Volume</button>
                    <button class="category-btn" data-category="time">Time</button>
                    <button class="category-btn" data-category="speed">Speed</button>
                </div>
            </div>

            <!-- Conversion Area -->
            <div class="conversion-area">
                <div class="converter-row">
                    <div class="input-group">
                        <label for="inputValue">From</label>
                        <input 
                            type="number" 
                            id="inputValue" 
                            class="converter-input" 
                            placeholder="Enter value"
                            step="any"
                        >
                        <select id="fromUnit" class="unit-select">
                            <!-- Options populated by JS -->
                        </select>
                    </div>

                    <div class="swap-btn-container">
                        <button id="swapBtn" class="swap-btn" title="Swap units">
                            ⇅
                        </button>
                    </div>

                    <div class="input-group">
                        <label for="outputValue">To</label>
                        <input 
                            type="number" 
                            id="outputValue" 
                            class="converter-input result" 
                            placeholder="Result"
                            readonly
                        >
                        <select id="toUnit" class="unit-select">
                            <!-- Options populated by JS -->
                        </select>
                    </div>
                </div>

                <!-- Conversion Formula -->
                <div class="formula-display" id="formulaDisplay">
                    Select a conversion to see the formula
                </div>
            </div>

            <!-- Conversion History -->
            <div class="history-section">
                <div class="history-header">
                    <h3>Conversion History</h3>
                    <button id="clearHistoryBtn" class="clear-history-btn">Clear</button>
                </div>
                <div class="history-list" id="historyList">
                    <p class="empty-history">No conversions yet</p>
                </div>
            </div>

            <!-- Quick Conversions -->
            <div class="quick-conversions-section">
                <h3>Quick Conversions</h3>
                <div class="quick-grid" id="quickGrid">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
